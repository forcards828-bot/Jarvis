name: Build JARVIS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        continue-on-error: true
        
      - name: Create gradlew if missing
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Downloading gradle wrapper..."
            curl -sLO https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.properties
            mkdir -p gradle/wrapper
            curl -sLo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar
            cat > gradlew << 'EOF'
          #!/bin/sh
          APP_HOME=$( cd "${0%/*}" && pwd -P )
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          if [ -n "$JAVA_HOME" ]; then JAVACMD=$JAVA_HOME/bin/java; else JAVACMD=java; fi
          exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
            chmod +x gradlew
          fi
          
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "gemini.api.key=${{ secrets.GEMINI_KEY }}" >> local.properties
          echo "youtube.api.key=${{ secrets.YOUTUBE_KEY }}" >> local.properties
          
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-hacker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
